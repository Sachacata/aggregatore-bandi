name: Aggiorna dati bandi

# Esegue l'orchestratore ogni notte e ricarica i dati aggiornati nel repo.
# Streamlit Community Cloud ridispiega l'app a ogni commit, quindi il sito
# resta aggiornato senza bisogno del PC acceso.

on:
  schedule:
    - cron: "0 4 * * *"     # ogni giorno alle 04:00 UTC (06:00 in Italia, ora legale)
  workflow_dispatch: {}      # permette anche l'avvio manuale dalla tab "Actions"

permissions:
  contents: write            # serve per ri-committare i dati aggiornati

jobs:
  aggiorna:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Esegui l'aggiornamento (nazionale + UE + novità)
        run: python src/aggiorna.py

      - name: Committa i dati aggiornati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bandi_reali.csv data/bandi_ue.csv data/visti_bandi.json data/nuovi_bandi.json
          git commit -m "Aggiornamento automatico dati bandi" || echo "Nessuna modifica da committare"
          git push
